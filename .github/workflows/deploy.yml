name: deploy

on:
  push:
    branches: [main]
    paths: ["containers/**"]
  workflow_dispatch: {}

jobs:
  # Discover every containers/<name>/ that has a Dockerfile, so adding a new
  # container is just a new folder — no workflow edits needed.
  discover:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.find.outputs.containers }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: find
        run: |
          dirs=$(find containers -mindepth 1 -maxdepth 1 -type d \
                   -exec test -e '{}/Dockerfile' \; -print \
                 | xargs -n1 basename | jq -R . | jq -cs .)
          echo "containers=$dirs" >> "$GITHUB_OUTPUT"
          echo "Found: $dirs"

  deploy:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJson(needs.discover.outputs.containers) }}
    permissions:
      contents: read
      packages: write # push to GHCR
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Compute image name (GHCR requires lowercase)
        id: vars
        env:
          MATRIX_CONTAINER: ${{ matrix.container }}
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          name="${MATRIX_CONTAINER,,}"
          echo "image=ghcr.io/${repo}/${name}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: containers/${{ matrix.container }}
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:${{ github.sha }}

      - name: Sync compose file to box
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: containers/${{ matrix.container }}/docker-compose.yml
          target: ~/containers/${{ matrix.container }}
          strip_components: 2

      - name: Deploy over SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          IMAGE: ${{ steps.vars.outputs.image }}:${{ github.sha }}
          CONTAINER: ${{ matrix.container }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,CONTAINER
          script: |
            set -e
            cd ~/containers/$CONTAINER
            [ -f .env ] || touch .env          # env_file needs it to exist
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
