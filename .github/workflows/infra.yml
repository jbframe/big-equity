name: terraform

on:
  push:
    branches: [main]
    paths: ["infra/**"]

# OIDC: GitHub mints a token AWS trusts — no stored AWS keys.
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    # Manual-approval gate before anything mutates AWS. Configure required
    # reviewers on the "production" environment in repo Settings.
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - run: terraform init

      - name: Terraform plan
        run: terraform plan -var "my_ip_cidr=${{ vars.MY_IP_CIDR }}" -out=plan.tfplan

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve plan.tfplan
