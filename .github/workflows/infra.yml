name: terraform

on:
  push:
    branches: [main]
    paths: ["infra/**"]

# OIDC: GitHub mints a token AWS trusts — no stored AWS keys.
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    # Manual-approval gate before anything mutates AWS. Configure required
    # reviewers on the "production" environment in repo Settings.
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - run: terraform init

      - name: Terraform plan
        run: terraform plan -var "my_ip_cidr=${{ vars.MY_IP_CIDR }}" -out=plan.tfplan

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve plan.tfplan
